apiVersion: infra.dev/v1alpha1
name: web-app
type: compute
spec:
  size: small
  replicas: 1
targets:
  - cloud: aws
    region: us-east-1
    credentialRef: aws-dev
  - cloud: azure
    region: eastus
    credentialRef: azure-dev
refs:
  - component: web-network
    output: subnet_ids
    as: subnetId
  - component: web-network
    output: vpc_id
    as: vpcId
